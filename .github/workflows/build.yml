name: Build Fabric 1.16.5 Mod

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - run: chmod +x gradlew

      - uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - run: ./gradlew clean remapJar --no-daemon

      - name: Show build/libs
        run: ls -l build/libs

      - uses: actions/upload-artifact@v4
        with:
          name: MyFabricMod-JAR
          path: build/libs/*.jar
