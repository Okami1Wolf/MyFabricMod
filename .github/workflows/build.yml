name: Build Fabric 1.16.5 Mod

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - uses: actions/checkout@v3

      # 2. Ставим Java 17
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # 3. Делаем gradlew исполняемым
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 4. Устанавливаем Gradle (GitHub-only)
      - uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '7.6'

      # 5. Сборка модa через Loom
      - name: Build mod JAR
        run: ./gradlew clean remapJar --no-daemon

      # 6. Проверяем build/libs
      - name: Show build/libs
        run: ls -l build/libs || echo "No JAR created"

      # 7. Загружаем артефакт
      - uses: actions/upload-artifact@v4
        with:
          name: MyFabricMod-JAR
          path: build/libs/*.jar
