name: Build Fabric 1.16.5 Mod

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Устанавливаем Java 17
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # 3. Устанавливаем Gradle 7.6 через официальный Action (GitHub-only)
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '7.6'

      # 4. Делаем gradlew исполняемым
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 5. Кешируем Gradle
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 6. Сборка Fabric модa через remapJar
      - name: Build mod JAR
        run: ./gradlew clean remapJar --no-daemon

      # 7. Проверяем что создано
      - name: Show build/libs
        run: ls -l build/libs || echo "No JAR created"

      # 8. Загружаем артефакт
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyFabricMod-JAR
          path: build/libs/*.jar
