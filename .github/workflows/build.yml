name: Build Fabric 1.16.5 Mod

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '7.6'
      - run: ./gradlew clean remapJar --no-daemon
      - run: ls -l build/libs || echo "No JAR created"
      - uses: actions/upload-artifact@v4
        with:
          name: MyFabricMod-JAR
          path: build/libs/*.jar
